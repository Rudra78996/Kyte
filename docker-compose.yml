services:
  api:
    image: kyte-api:${RELEASE_VERSION:-local}
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-local}
    environment:
      PORT: ${API_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?Authenticated REDIS_URL is required}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:?CLERK_AUTHORIZED_PARTIES is required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET is required}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost/github/callback}
      WEBHOOK_CALLBACK_URL: ${WEBHOOK_CALLBACK_URL:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      NEXT_PUBLIC_SITES_DOMAIN: ${NEXT_PUBLIC_SITES_DOMAIN:-sites.localhost}
      NEXT_PUBLIC_SITES_SCHEME: ${NEXT_PUBLIC_SITES_SCHEME:-http}
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
      SITES_DOMAIN: ${SITES_DOMAIN:-sites.localhost}
      DOMAIN_CNAME_TARGET: ${DOMAIN_CNAME_TARGET:-}
      DASHBOARD_ORIGINS: ${DASHBOARD_ORIGINS:?DASHBOARD_ORIGINS is required}
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - app-net
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: kyte-worker:${RELEASE_VERSION:-local}
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-local}
    command: ["npm", "run", "worker"]
    environment:
      WORKER_PORT: ${WORKER_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?Authenticated REDIS_URL is required}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      BUILD_EXCHANGE_ROOT: /var/lib/kyte-builds
    depends_on:
      redis:
        condition: service_healthy
      build-runner:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    networks:
      - app-net
      - worker-net
    volumes:
      - build_exchange:/var/lib/kyte-builds
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  build-runner:
    image: kyte-build-runner:${RELEASE_VERSION:-local}
    build:
      context: ./server
      dockerfile: Dockerfile.worker
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-local}
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SETPCAP
      - SETUID
      - SETGID
      - FOWNER
    cap_drop:
      - ALL
    group_add:
      - "1000"
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    command: ["/app/start-worker.sh"]
    restart: unless-stopped
    read_only: true
    environment:
      BUILD_EXCHANGE_ROOT: /var/lib/kyte-builds
      BUILD_RUNNER_HEALTH_PORT: 3002
      BUILD_MAX_WORKSPACE_BYTES: 1500000000
      BUILD_MAX_LOG_BYTES: 5000000
    networks:
      - build-egress-net
    volumes:
      - build_exchange:/var/lib/kyte-builds
    depends_on:
      storage-init:
        condition: service_completed_successfully
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    mem_limit: 1536m
    # Preserve one full host CPU for the API, database, storage, and proxy on
    # the recommended small 2-vCPU production VPS.
    cpus: 1.0
    pids_limit: 600
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command:
      [
        "sh",
        "-c",
        "exec redis-server --requirepass \"$${REDIS_PASSWORD}\"",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    user: "999:1000"
    volumes:
      - redis_data:/data
    networks:
      - app-net
      - worker-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: kyte-minio:${RELEASE_VERSION:-local}
    build:
      context: ./infra/minio
      dockerfile: Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-local}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-net
    depends_on:
      storage-init:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc mb --ignore-existing local/kyte-private-control
        test "$${MINIO_BUCKET}" = "deployly-projects"
        mc admin policy create local kyte-app /config/kyte-policy.json
        mc admin user add local "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}" ||
          mc admin user enable local "$${MINIO_ACCESS_KEY}"
        mc admin policy attach local kyte-app --user "$${MINIO_ACCESS_KEY}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      MC_CONFIG_DIR: /tmp/mc
    volumes:
      - ./infra/minio/kyte-policy.json:/config/kyte-policy.json:ro
    networks:
      - app-net
    depends_on:
      minio:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  storage-init:
    image: alpine@sha256:4bcff63911fcb4448bd4fdacec207030997caf25e9bea4045fa6c8c44de311d1
    command:
      - "sh"
      - "-c"
      - |
        set -eu
        mkdir -p /builds/queue /builds/running /builds/work /builds/logs /builds/results
        chown -R 1000:1000 /builds
        find /builds/queue /builds/running /builds/logs /builds/results -type f -exec chmod 0660 {} +
        chmod 2770 /builds/queue /builds/running /builds/logs /builds/results
        chmod 2771 /builds/work
        chmod 2771 /builds
        chown -R 10001:10001 /minio
        chown -R 999:1000 /redis
    volumes:
      - build_exchange:/builds
      - minio_data:/minio
      - redis_data:/redis
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
    group_add:
      - "1000"
    security_opt:
      - no-new-privileges:true

  web:
    image: kyte-web:${RELEASE_VERSION:-local}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-local}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${CADDY_HTTP_PORT:-80}/api}
        NEXT_PUBLIC_SITES_DOMAIN: ${NEXT_PUBLIC_SITES_DOMAIN:-sites.localhost}
        NEXT_PUBLIC_SITES_SCHEME: ${NEXT_PUBLIC_SITES_SCHEME:-http}
    environment:
      PORT: ${WEB_PORT:-3000}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${CADDY_HTTP_PORT:-80}/api}
      NEXT_PUBLIC_SITES_DOMAIN: ${NEXT_PUBLIC_SITES_DOMAIN:-sites.localhost}
      NEXT_PUBLIC_SITES_SCHEME: ${NEXT_PUBLIC_SITES_SCHEME:-http}
    ports:
      - "127.0.0.1:${WEB_PORT:-3002}:3000"
    networks:
      - app-net
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  build_exchange:

networks:
  app-net:
  worker-net:
    internal: true
  build-egress-net:
