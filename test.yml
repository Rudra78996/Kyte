services:
  web:
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  api:
    command: ["npm", "run", "start:dev"]
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  worker:
    volumes:
      - ./server:/app
      - /app/node_modules
