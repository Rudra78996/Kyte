# Use this override on a VPS where Caddy is installed on the host and shared
# by multiple applications. It disables Kyte's embedded Caddy container.
services:
  api:
    restart: unless-stopped

  web:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  # Production builds remain off during the database/API/web verification
  # stage. Enable this profile only after those checks pass.
  worker:
    profiles: ["builds"]
    restart: unless-stopped

  build-runner:
    profiles: ["builds"]
    restart: unless-stopped

  caddy:
    profiles: ["embedded-caddy"]
